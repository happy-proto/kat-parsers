language = "<lang>"
crate = "tree-sitter-kat-parsers"
upstream_repo = "https://github.com/<owner>/<repo>"
upstream_commit = "<commit>"
license = "<license>"

[copied]
files = [
  "grammar.js",
  # "tree-sitter.json",
  # "src/scanner.c",
  # "src/unicode.c",
  # "src/tree_sitter/alloc.h",
  # "src/tree_sitter/array.h",
  # "src/tree_sitter/parser.h",
  # "LICENSE",
]

[generated]
command = "cargo run -p xtask -- generate <lang>"
outputs = [
  ".parser-inputs",
  "parser.c",
  "grammar.json",
  "node-types.json",
  # "scanner.c",
  # "unicode.c",
  # "tree_sitter/alloc.h",
  # "tree_sitter/array.h",
  # "tree_sitter/parser.h",
]
