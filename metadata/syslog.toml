language = "syslog"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """当前直接在仓库内维护了面向经典 syslog 行结构的小 grammar，用来稳定承接月份、时间、主机、进程和消息体的最小可读分层。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate syslog"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
