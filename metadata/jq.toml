language = "jq"
crate = "tree-sitter-kat-parsers"
reason_category = "许可证原因，继续使用 vendored 方案更合适"
reason = """当前 crates.io 上常用的 `tree-sitter-jq` 走 GPL 许可证链路；仓库里改用 BSD 3-Clause 上游并保留 vendored parser 源。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate jq"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
