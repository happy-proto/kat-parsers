language = "stylus"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """当前仓库内维护的是面向缩进式 Stylus 语法的本地最小 grammar，优先保证 `.styl` / `.stylus` 的稳定可读性，而不是强行依赖一条维护状态不稳定的外部依赖链。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate stylus"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
