language = "cmakecache"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """仓库内维护了一个专门面向 `CMakeCache.txt` 的小 grammar，用来稳定承接 key/type/value 结构和 path-like value 高亮。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate cmakecache"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
