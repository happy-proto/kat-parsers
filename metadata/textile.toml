language = "textile"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """当前仓库内维护的是本地最小 Textile grammar；已评估过上游实现，但其授权元数据暂不适合直接 vendored 进仓库。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate textile"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
