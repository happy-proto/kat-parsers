language = "markdown_inline"
crate = "tree-sitter-kat-parsers"
reason_category = "已有 crate，但仍依赖旧版 `tree-sitter`，暂时无法和当前 0.26 系列共存"
generator_support_files = [
  "../markdown/common.js",
  "../markdown/html_entities.json",
]

[copied]
files = [
  "grammar.js",
  "scanner.c",
]

[generated]
command = "cargo run -p xtask -- generate markdown_inline"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
  "scanner.c",
]
