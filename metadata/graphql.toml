language = "graphql"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """当前 highlights query 是按 vendored grammar 的节点结构维护的本地集成版本。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate graphql"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
