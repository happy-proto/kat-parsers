language = "vyper"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """上游 grammar 在当前集成目标下不够稳定，因此仓库内先维护一份面向 Vyper 合约结构的本地最小 grammar 与 query，优先保证 detector、fixture 和基础高亮可持续演进。"""

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate vyper"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
