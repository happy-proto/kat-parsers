language = "svelte"
crate = "tree-sitter-kat-parsers"
reason_category = "已有 crate，但仍依赖旧版 `tree-sitter`，暂时无法和当前 0.26 系列共存"

[copied]
files = [
  "allocator.h",
  "ekstring.h",
  "grammar.js",
  "scanner.c",
  "tag.h",
  "uthash.h",
  "vc_vector.h",
]

[generated]
command = "cargo run -p xtask -- generate svelte"
outputs = [
  ".parser-inputs",
  "allocator.h",
  "ekstring.h",
  "grammar.json",
  "node-types.json",
  "parser.c",
  "scanner.c",
  "tag.h",
  "uthash.h",
  "vc_vector.h",
]
