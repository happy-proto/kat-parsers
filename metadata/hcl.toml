language = "hcl"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """本地 grammar/scanner 做过适配，用来承接 `.hcl` 和 `.nomad` 这类文件的独立 runtime。"""

[copied]
files = [
  "grammar.js",
  "scanner.c",
]

[generated]
command = "cargo run -p xtask -- generate hcl"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
  "scanner.c",
]
