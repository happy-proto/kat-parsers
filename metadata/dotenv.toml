language = "dotenv"
crate = "tree-sitter-kat-parsers"
reason_category = "没有可用的 crates.io grammar crate"

[copied]
files = [
  "grammar.js",
  "scanner.c",
]

[generated]
command = "cargo run -p xtask -- generate dotenv"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
  "scanner.c",
]
