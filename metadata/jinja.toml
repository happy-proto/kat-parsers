language = "jinja"
crate = "tree-sitter-kat-parsers"
reason_category = "仓库内有本地 grammar 或 scanner 改造，短期内不适合直接切回上游 crate"
reason = """`grammar.js` 是仓库内包装层，指向 vendored base grammar 和 kat 的 HTML 注入模型。"""

[copied]
files = [
  "base_grammar.js",
  "common/common.js",
  "common/expression.js",
  "common/literal.js",
  "grammar.js",
  "scanner.c",
]

[generated]
command = "cargo run -p xtask -- generate jinja"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
  "scanner.c",
]
