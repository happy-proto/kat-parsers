language = "git_commit"
crate = "tree-sitter-kat-parsers"
reason_category = "没有可用的 crates.io grammar crate"

[copied]
files = [
  "grammar.js",
]

[generated]
command = "cargo run -p xtask -- generate git_commit"
outputs = [
  ".parser-inputs",
  "grammar.json",
  "node-types.json",
  "parser.c",
]
