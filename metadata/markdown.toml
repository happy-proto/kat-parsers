reason_category = "已有 crate，但仍依赖旧版 `tree-sitter`，暂时无法和当前 0.26 系列共存"

[copied]
files = [
  "common.js",
  "grammar.js",
  "html_entities.json",
  "scanner.c",
]

[generated]
command = "cargo run -p xtask -- generate markdown"
