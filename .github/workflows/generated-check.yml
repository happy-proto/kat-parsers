name: Generated Check

on:
  push:
  pull_request:

jobs:
  generated-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: tree-sitter-cli
      - run: cargo run -p xtask -- generate --force
      - run: git diff --exit-code
      - run: cargo test --workspace
